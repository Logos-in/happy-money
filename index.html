<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리집 실시간 가계부</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --surface-light: #2c2c2c;
            --text-primary: #e0e0e0;
            --text-secondary: #aaaaaa;
            --accent-color: #4db8ff;
            --danger-color: #ff6b6b;
            --border-color: #383838;
        }

        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            font-size: 16px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-window {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            width: 95vw;
            max-width: 850px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            resize: both; 
        }

        #login-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--surface-color);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .menu-bar {
            display: flex;
            background-color: var(--surface-light);
            padding: 5px 10px;
            border-bottom: 1px solid var(--border-color);
            gap: 5px;
            flex-shrink: 0; 
        }

        .menu-btn {
            flex: 1;
            box-sizing: border-box;
            background: transparent;
            color: var(--text-secondary);
            border: none; 
            outline: none;
            padding: 14px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px; 
            font-weight: bold;
            text-align: center;
            transition: background-color 0.2s, color 0.2s;
        }

        .menu-btn.active {
            color: #fff;
            background-color: var(--accent-color);
        }

        .content-area {
            padding: 20px 15px;
            flex-grow: 1;
            overflow-y: auto;
            min-height: 0; 
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .month-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            background: var(--surface-light);
            padding: 12px;
            border-radius: 8px;
            flex-shrink: 0;
            font-size: 18px;
        }

        .summary-card {
            background-color: var(--surface-light);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 16px; }
        .amount-val { font-weight: bold; }

        table { width: 100%; border-collapse: collapse; font-size: 15px; }
        th, td { padding: 14px 8px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-secondary); font-weight: normal; }

        .progress-track { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; margin-top: 8px; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: var(--text-secondary); margin-bottom: 6px; }
        
        input[type="text"], input[type="date"], input[type="password"], select {
            width: 100%;
            background: var(--bg-color);
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        input:focus { border-color: var(--accent-color); }

        .submit-btn {
            width: 100%;
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            outline: none;
        }

        .action-btn {
            padding: 6px 10px;
            border-radius: 4px;
            border: none;
            font-size: 12px;
            cursor: pointer;
            color: white;
            margin-right: 3px;
            outline: none;
        }
        .edit-btn { background-color: var(--accent-color); }
        .del-btn { background-color: var(--danger-color); }

        .admin-col { display: none; }
        .edit-mode-active .admin-col { display: table-cell; }

        /* 고정 지출 편집 전용 클래스 */
        .fixed-admin-col { display: none; }
        .fixed-edit-mode-active .fixed-admin-col { display: flex; }

        .category-item {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            background: var(--surface-light);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .cat-badge {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .color-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2px;
        }

        @media (max-width: 480px) {
            .app-window { width: 100vw; height: 100vh; border-radius: 0; border: none; }
            th, td { padding: 12px 6px; font-size: 14px; }
            .menu-btn { font-size: 13px; padding: 14px 0; }
        }
    </style>
</head>
<body>

<div class="app-window">
    <div id="login-screen">
        <h2 style="margin-bottom: 10px; font-size: 24px;">🔒 우리집 가계부</h2>
        <p style="color:var(--text-secondary); margin-bottom: 20px; font-size: 16px;">비밀번호 4자리</p>
        <input type="password" id="pwd-input" inputmode="numeric" pattern="[0-9]*" placeholder="Pass" style="width:160px; text-align:center; font-size:26px; letter-spacing:10px;" onkeydown="if(event.key==='Enter') checkLogin()">
        <button class="submit-btn" style="width:160px; margin-top:20px;" onclick="checkLogin()">접속</button>
    </div>

    <div class="menu-bar">
        <button class="menu-btn active" id="btn-dashboard" onclick="switchTab('dashboard', this)">현황</button>
        <button class="menu-btn" id="btn-expense" onclick="switchTab('expense-add', this)">지출등록</button>
        <button class="menu-btn" id="btn-history" onclick="switchTab('history', this)">내역</button>
        <button class="menu-btn" id="btn-fixed" onclick="switchTab('fixed-expense', this)">고정지출</button>
        <button class="menu-btn" id="btn-settings" onclick="switchTab('settings', this)">설정</button>
    </div>

    <div class="content-area">
        <div class="month-selector" id="month-nav">
            <button onclick="changeMonth(-1)" style="background:none; border:none; color:white; cursor:pointer;">◀</button>
            <strong id="display-month">2026-05</strong>
            <button onclick="changeMonth(1)" style="background:none; border:none; color:white; cursor:pointer;">▶</button>
        </div>

        <div id="dashboard" class="tab-content active">
            <div class="summary-card">
                <div class="summary-row"><span>예산 총액</span><span id="stat-total-budget" class="amount-val">0원</span></div>
                <div class="summary-row"><span>총 지출</span><span id="stat-expense" class="amount-val" style="color:var(--danger-color)">0원</span></div>
                <hr style="border:0; border-top:1px solid var(--border-color); margin:12px 0;">
                <div class="summary-row"><span>남은 예산</span><strong id="stat-remain" class="amount-val" style="font-size:1.2em;">0원</strong></div>
            </div>
            <table id="budget-table">
                <thead><tr><th>항목</th><th>사용 / 예산</th><th>잔액</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="expense-add" class="tab-content">
            <h3 id="form-title" style="margin-top:0; font-size: 20px;">지출 기록</h3>
            <input type="hidden" id="edit-id">
            <div class="form-group"><label>날짜</label><input type="date" id="exp-date"></div>
            <div class="form-group"><label>항목</label><select id="exp-category"></select></div>
            <div class="form-group"><label>내용</label><input type="text" id="exp-note" placeholder="어디서 썼나요?"></div>
            <div class="form-group">
                <label>금액</label>
                <input type="text" id="exp-amount" inputmode="numeric" placeholder="0" oninput="inputFormatting(this)">
            </div>
            <button class="submit-btn" id="save-btn" onclick="saveTransaction()">지출 저장</button>
            <button class="submit-btn" id="cancel-btn" style="background:#555; display:none; margin-top:10px;" onclick="cancelEdit()">수정 취소</button>
        </div>

        <div id="history" class="tab-content">
            <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:15px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <h3 style="margin:0; font-size: 20px;">월간 내역</h3>
                        <button id="toggle-edit-btn" onclick="toggleEditMode()" style="background:#444; color:var(--accent-color); border:1px solid var(--accent-color); padding:6px 12px; border-radius:4px; font-size:12px; cursor:pointer; outline:none;">편집</button>
                    </div>
                    <select id="history-filter" onchange="updateHistoryOnly()" style="width:120px; padding:8px; font-size:14px; background:var(--bg-color); color:#fff; border:1px solid var(--border-color); border-radius:6px; outline:none;">
                        <option value="all">전체 항목</option>
                    </select>
                </div>
                <div style="display:flex; gap:6px; justify-content:flex-end;">
                    <button onclick="document.getElementById('csv-file').click()" style="background:#555; color:white; border:none; padding:8px 10px; border-radius:4px; font-size:12px; outline:none; cursor:pointer;">가져오기</button>
                    <input type="file" id="csv-file" accept=".csv" style="display:none;" onchange="importCSV(this)">
                    <button onclick="exportCSV('current')" style="background:#444; color:white; border:none; padding:8px 10px; border-radius:4px; font-size:12px; outline:none; cursor:pointer;">월간저장</button>
                    <button onclick="exportCSV('all')" style="background:#4db8ff; color:white; border:none; padding:8px 10px; border-radius:4px; font-size:12px; outline:none; cursor:pointer;">전체저장</button>
                </div>
            </div>
            
            <table id="history-table">
                <thead><tr><th>날짜</th><th>내용 / 항목</th><th>금액</th><th class="admin-col">관리</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="fixed-expense" class="tab-content">
            <h3 style="margin-top:0; font-size: 20px;">고정 지출 관리</h3>
            
            <div class="summary-card">
                <div class="summary-row">
                    <span style="display:flex; align-items:center;">해당 월 총 급여</span>
                    <input type="text" id="fixed-salary-input" inputmode="numeric" placeholder="급여 입력" oninput="inputFormatting(this)" onchange="saveFixedSalary(this.value)" style="width: 160px; padding: 10px; text-align: right; font-weight: bold; font-size: 16px; color: var(--accent-color);">
                </div>
                <hr style="border:0; border-top:1px solid var(--border-color); margin:15px 0;">
                <div class="summary-row"><span>고정 지출 합계</span><span id="fixed-total" class="amount-val" style="color:var(--danger-color)">0원</span></div>
                <div class="summary-row"><span>급여 대비 고정비율</span><strong id="fixed-percent" class="amount-val" style="color:var(--accent-color)">0%</strong></div>
                <div class="summary-row" style="margin-top: 15px;"><span>남은 여유 자금</span><strong id="fixed-remain" class="amount-val" style="font-size:1.2em;">0원</strong></div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
                <div style="display:flex; gap:6px; align-items:stretch; flex:1; min-width:260px;">
                    <input type="text" id="new-fixed-name" placeholder="새 항목 (예: 통신비)" style="flex:1;">
                    <input type="text" id="new-fixed-amount" inputmode="numeric" placeholder="금액" oninput="inputFormatting(this)" style="width: 100px; text-align:right;">
                    <button onclick="addFixedExpense()" style="background:var(--accent-color); border:none; padding:0 14px; border-radius:6px; color:white; outline:none; font-size: 14px; font-weight: bold; cursor:pointer; white-space:nowrap;">추가</button>
                </div>
                <button id="toggle-fixed-edit-btn" onclick="toggleFixedEditMode()" style="background:#444; color:var(--accent-color); border:1px solid var(--accent-color); padding:8px 12px; border-radius:4px; font-size:12px; font-weight:bold; cursor:pointer; outline:none; white-space:nowrap;">편집</button>
            </div>

            <div id="fixed-list"></div>
        </div>

        <div id="settings" class="tab-content">
            <h3 style="margin-top:0; font-size: 20px;">지출 항목 및 예산 설정</h3>
            <div style="display:flex; gap:8px; margin-bottom:20px;">
                <input type="text" id="new-cat-name" placeholder="새 항목 명">
                <button onclick="addCategory()" style="background:var(--accent-color); border:none; padding:14px; border-radius:6px; color:white; outline:none; font-size: 15px; font-weight: bold;">추가</button>
            </div>
            <div id="category-list"></div>
            <button class="submit-btn" style="margin-top:20px;" onclick="saveCategories()">설정 저장 (DB 반영)</button>
        </div>
    </div>
</div>

<script>
    /* ----------------------------------------------------
       1. FIREBASE 설정
    ---------------------------------------------------- */
    const firebaseConfig = {
        apiKey: "AIzaSyAHUwiRjqz4__6529TbXBq4tiRT5YJPNiQ",
        authDomain: "happy-money-1f688.firebaseapp.com",
        databaseURL: "https://happy-money-1f688-default-rtdb.firebaseio.com",
        projectId: "happy-money-1f688",
        storageBucket: "happy-money-1f688.firebasestorage.app",
        messagingSenderId: "75003891526",
        appId: "1:75003891526:web:611a550413c590c06d1f47"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /* ----------------------------------------------------
       2. 상태 및 기본 데이터
    ---------------------------------------------------- */
    let isEditMode = false;
    let isFixedEditMode = false; // 고정 지출 편집 모드 상태
    let editingFixedId = null;   // 현재 인라인 편집 중인 고정지출 ID

    let currentDate = new Date();
    let categories = [];
    let transactions = [];
    
    let fixedSalary = 0;
    let fixedExpenses = [];

    const catColors = ['#ff6b6b', '#4ea8de', '#f9c74f', '#90be6d', '#f8961e', '#c77dff', '#43aa8b', '#f94144'];

    const format = (n) => Number(n).toLocaleString() + '원';
    const parseFormatted = (str) => parseInt(String(str).replace(/,/g, "")) || 0;

    function hexToRgba(hex, alpha) {
        if (!hex || hex[0] !== '#') return `rgba(255, 255, 255, ${alpha})`;
        let r = parseInt(hex.slice(1, 3), 16),
            g = parseInt(hex.slice(3, 5), 16),
            b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    const defaultCats = [
        { id: 1, name: '식재료', budget: 1200000, textColor: '#ff6b6b', borderColor: '#ff6b6b' },
        { id: 2, name: '외식', budget: 300000, textColor: '#4ea8de', borderColor: '#4ea8de' },
        { id: 3, name: '보험금', budget: 500000, textColor: '#f9c74f', borderColor: '#f9c74f' },
        { id: 4, name: '잡화', budget: 400000, textColor: '#90be6d', borderColor: '#90be6d' },
        { id: 5, name: '예비비', budget: 200000, textColor: '#f8961e', borderColor: '#f8961e' },
        { id: 6, name: '연료', budget: 150000, textColor: '#c77dff', borderColor: '#c77dff' },
        { id: 7, name: '엄마 활동비', budget: 150000, textColor: '#43aa8b', borderColor: '#43aa8b' },
        { id: 8, name: '성준이랑', budget: 100000, textColor: '#f94144', borderColor: '#f94144' }
    ];

    /* ----------------------------------------------------
       3. 실시간 동기화
    ---------------------------------------------------- */
    db.ref('categories').on('value', (snapshot) => {
        const data = snapshot.val();
        categories = data ? Object.values(data) : defaultCats;
        refreshUI();
    });

    db.ref('transactions').on('value', (snapshot) => {
        const data = snapshot.val();
        transactions = data ? Object.values(data) : [];
        refreshUI();
    });

    db.ref('fixed_salary').on('value', (snapshot) => {
        fixedSalary = snapshot.val() || 0;
        const inputEl = document.getElementById('fixed-salary-input');
        if (document.activeElement !== inputEl) {
            inputEl.value = fixedSalary ? Number(fixedSalary).toLocaleString() : '';
        }
        renderFixedExpenses();
    });

    db.ref('fixed_expenses').on('value', (snapshot) => {
        const data = snapshot.val();
        fixedExpenses = data ? Object.values(data) : [];
        renderFixedExpenses();
    });


    /* ----------------------------------------------------
       4. 주요 로직
    ---------------------------------------------------- */
    function checkLogin() {
        if(document.getElementById('pwd-input').value.trim() === '0509') {
            document.getElementById('login-screen').style.display = 'none';
        } else {
            alert('비밀번호가 틀렸습니다.');
            document.getElementById('pwd-input').value = '';
        }
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        
        document.getElementById('month-nav').style.display = (id === 'dashboard' || id === 'history') ? 'flex' : 'none';
        
        // 탭 이동 시 편집 모드들 초기화
        if(isEditMode) toggleEditMode();
        if(isFixedEditMode) toggleFixedEditMode();
        
        refreshUI();
    }

    function changeMonth(val) {
        currentDate.setMonth(currentDate.getMonth() + val);
        refreshUI();
    }

    function inputFormatting(el) {
        let value = el.value.replace(/[^0-9]/g, "");
        el.value = value ? Number(value).toLocaleString() : "";
    }

    /* ----------------------------------------------------
       지출 관리
    ---------------------------------------------------- */
    function saveTransaction() {
        const editId = document.getElementById('edit-id').value;
        const date = document.getElementById('exp-date').value;
        const note = document.getElementById('exp-note').value;
        const amount = parseFormatted(document.getElementById('exp-amount').value);
        const catId = parseInt(document.getElementById('exp-category').value);

        if(!date || amount <= 0) return alert('정확한 데이터를 입력하세요.');

        const id = editId || Date.now();
        db.ref('transactions/' + id).set({ id, date, note, amount, catId })
            .then(() => {
                alert(editId ? '수정 완료' : '저장 완료');
                cancelEdit();
                switchTab('history', document.getElementById('btn-history'));
            });
    }

    function deleteTransaction(id) {
        if(confirm('정말 삭제하시겠습니까?')) db.ref('transactions/' + id).remove();
    }

    /* ----------------------------------------------------
       고정 지출 기능 관련 로직 (인라인 편집 적용)
    ---------------------------------------------------- */
    function saveFixedSalary(val) {
        const parsed = parseFormatted(val);
        db.ref('fixed_salary').set(parsed);
    }

    function addFixedExpense() {
        const name = document.getElementById('new-fixed-name').value.trim();
        const amountVal = document.getElementById('new-fixed-amount').value;
        const amount = parseFormatted(amountVal);

        if(!name || amount <= 0) return alert('항목명과 정확한 금액을 입력하세요.');

        const id = Date.now();
        db.ref('fixed_expenses/' + id).set({ id, name, amount }).then(() => {
            document.getElementById('new-fixed-name').value = '';
            document.getElementById('new-fixed-amount').value = '';
        });
    }

    function toggleFixedEditMode() {
        isFixedEditMode = !isFixedEditMode;
        const list = document.getElementById('fixed-list');
        const btn = document.getElementById('toggle-fixed-edit-btn');
        if (isFixedEditMode) {
            list.classList.add('fixed-edit-mode-active');
            btn.innerText = '완료';
            btn.style.backgroundColor = 'var(--accent-color)';
            btn.style.color = '#fff';
        } else {
            list.classList.remove('fixed-edit-mode-active');
            btn.innerText = '편집';
            btn.style.backgroundColor = '#444';
            btn.style.color = 'var(--accent-color)';
            editingFixedId = null; // 진행 중인 인라인 편집 초기화
            renderFixedExpenses();
        }
    }

    function startInlineFixedEdit(id) {
        editingFixedId = id;
        renderFixedExpenses();
    }

    function cancelInlineFixedEdit() {
        editingFixedId = null;
        renderFixedExpenses();
    }

    function saveInlineFixedExpense(id) {
        const nameInput = document.getElementById(`inline-fixed-name-${id}`);
        const amountInput = document.getElementById(`inline-fixed-amount-${id}`);
        
        const name = nameInput.value.trim();
        const amount = parseFormatted(amountInput.value);

        if(!name || amount <= 0) return alert('항목명과 정확한 금액을 입력하세요.');

        db.ref('fixed_expenses/' + id).update({ name, amount }).then(() => {
            editingFixedId = null;
        });
    }

    function deleteFixedExpense(id) {
        if(confirm('이 고정 지출 항목을 삭제하시겠습니까?')) {
            db.ref('fixed_expenses/' + id).remove();
        }
    }

    function renderFixedExpenses() {
        const list = document.getElementById('fixed-list');
        let totalFixed = 0;

        list.innerHTML = fixedExpenses.map(f => {
            totalFixed += f.amount;
            const isEditingThis = (editingFixedId === f.id);

            // 해당 항목이 '수정' 모드일 때 인라인 입력창 렌더링
            if (isEditingThis) {
                return `
                <div class="category-item" style="justify-content: space-between; padding: 14px 16px; background: var(--surface-light); border-left: 4px solid var(--accent-color);">
                    <div style="display:flex; gap:8px; flex:1; align-items:center; flex-wrap:wrap;">
                        <input type="text" id="inline-fixed-name-${f.id}" value="${f.name}" style="flex:1; min-width:100px; padding:8px; font-size:15px; background:var(--bg-color); color:#fff; border:1px solid var(--border-color); border-radius:4px; outline:none;">
                        <input type="text" id="inline-fixed-amount-${f.id}" value="${Number(f.amount).toLocaleString()}" inputmode="numeric" oninput="inputFormatting(this)" style="width:100px; padding:8px; font-size:15px; text-align:right; background:var(--bg-color); color:#fff; border:1px solid var(--border-color); border-radius:4px; outline:none;">
                    </div>
                    <div style="display:flex; gap:4px; align-items:center; margin-left:8px;">
                        <button onclick="saveInlineFixedExpense(${f.id})" style="background:var(--accent-color); border:none; color:white; padding:8px 12px; border-radius:4px; font-size:13px; font-weight:bold; cursor:pointer;">저장</button>
                        <button onclick="cancelInlineFixedEdit()" style="background:#555; border:none; color:white; padding:8px 12px; border-radius:4px; font-size:13px; font-weight:bold; cursor:pointer;">취소</button>
                    </div>
                </div>
                `;
            } else {
                // 평상시 뷰 모드
                return `
                <div class="category-item" style="justify-content: space-between; padding: 14px 16px; background: var(--surface-light); border-left: 4px solid var(--danger-color);">
                    <span style="font-weight:bold; font-size:16px;">${f.name}</span>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="color:var(--danger-color); font-weight:bold; font-size:16px; margin-right:4px;">-${format(f.amount)}</span>
                        <div class="fixed-admin-col" style="align-items:center; gap:4px;">
                            <button class="action-btn edit-btn" onclick="startInlineFixedEdit(${f.id})" style="padding: 6px 12px; font-size: 13px;">수정</button>
                            <button class="action-btn del-btn" onclick="deleteFixedExpense(${f.id})" style="padding: 6px 12px; font-size: 13px;">삭제</button>
                        </div>
                    </div>
                </div>
                `;
            }
        }).join('');

        // 편집 모드 클래스 유지
        if (isFixedEditMode) list.classList.add('fixed-edit-mode-active');
        else list.classList.remove('fixed-edit-mode-active');

        document.getElementById('fixed-total').innerText = format(totalFixed);
        document.getElementById('fixed-remain').innerText = format(fixedSalary - totalFixed);
        
        const percent = fixedSalary > 0 ? ((totalFixed / fixedSalary) * 100).toFixed(1) : 0;
        document.getElementById('fixed-percent').innerText = `${percent}%`;
    }

    /* ----------------------------------------------------
       카테고리 관리
    ---------------------------------------------------- */
    function saveCategories() {
        db.ref('categories').set(categories).then(() => alert('항목 설정이 실시간 저장되었습니다.'));
    }

    function addCategory() {
        const name = document.getElementById('new-cat-name').value;
        if(!name) return;
        const color = catColors[categories.length % catColors.length];
        categories.push({ id: Date.now(), name, budget: 0, textColor: color, borderColor: color });
        document.getElementById('new-cat-name').value = '';
        renderSettings();
    }

    function deleteCat(id) {
        if(confirm('항목을 삭제하시겠습니까?')) {
            categories = categories.filter(c => c.id !== id);
            renderSettings();
        }
    }

    /* ----------------------------------------------------
       UI 화면 업데이트 로직
    ---------------------------------------------------- */
    function refreshUI() {
        const year = currentDate.getFullYear();
        const month = String(currentDate.getMonth() + 1).padStart(2, '0');
        const monthStr = `${year}-${month}`;
        document.getElementById('display-month').innerText = monthStr;
        updateDashboard(monthStr);
        updateHistory(monthStr);
        renderSettings();
        initCategorySelect();
    }

    function updateDashboard(monthStr) {
        const filtered = transactions.filter(t => t.date.startsWith(monthStr));
        const totalExp = filtered.reduce((a, b) => a + b.amount, 0);
        const totalBudget = categories.reduce((a, b) => a + b.budget, 0);

        document.getElementById('stat-total-budget').innerText = format(totalBudget);
        document.getElementById('stat-expense').innerText = format(totalExp);
        document.getElementById('stat-remain').innerText = format(totalBudget - totalExp);

        const tbody = document.querySelector('#budget-table tbody');
        tbody.innerHTML = categories.map((c, index) => {
            const spent = filtered.filter(t => t.catId === c.id).reduce((a, b) => a + b.amount, 0);
            const remain = c.budget - spent;
            const per = c.budget > 0 ? Math.min((spent/c.budget)*100, 100) : (spent > 0 ? 100 : 0);
            
            const fallbackColor = catColors[index % catColors.length];
            const bColor = c.borderColor || fallbackColor;
            const bgColor = hexToRgba(bColor, 0.12);

            return `<tr style="background-color: ${bgColor}; border-bottom: 1px solid var(--border-color);">
                <td style="font-weight: bold;">${c.name}
                    <div class="progress-track"><div class="progress-fill" style="width:${per}%; background:${spent > c.budget ? 'var(--danger-color)': bColor}"></div></div>
                </td>
                <td>${format(spent)}<br><small style="color:var(--text-secondary)">/ ${format(c.budget)}</small></td>
                <td style="color:${remain < 0 ? 'var(--danger-color)' : 'inherit'}; font-weight: bold;">${format(remain)}</td>
            </tr>`;
        }).join('');
    }

    function updateHistoryOnly() {
        const monthStr = document.getElementById('display-month').innerText;
        updateHistory(monthStr);
    }

    function updateHistory(monthStr) {
        const filterVal = document.getElementById('history-filter').value;
        let filtered = transactions.filter(t => t.date.startsWith(monthStr));
        
        if (filterVal !== 'all') {
            filtered = filtered.filter(t => t.catId == filterVal);
        }
        filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
        
        const tbody = document.querySelector('#history-table tbody');
        tbody.innerHTML = filtered.map(t => {
            const cat = categories.find(c => c.id === t.catId);
            const catName = cat ? cat.name : '미지정';
            const catIndex = cat ? categories.indexOf(cat) : 0;
            
            const fallbackColor = catColors[catIndex % catColors.length];
            const tColor = (cat && cat.textColor) ? cat.textColor : fallbackColor;
            const bColor = (cat && cat.borderColor) ? cat.borderColor : fallbackColor;
            const bgColor = hexToRgba(bColor, 0.08);

            return `<tr style="background-color: ${bgColor}; border-bottom: 1px solid var(--border-color);">
                <td>${t.date.slice(5)}</td>
                <td>
                    <span style="font-size: 15px;">${t.note}</span><br>
                    <span class="cat-badge" style="color: ${tColor}; border: 1px solid ${bColor};">${catName}</span>
                </td>
                <td style="color:var(--danger-color); font-weight:bold; font-size: 15px;">-${format(t.amount)}</td>
                <td class="admin-col">
                    <button class="action-btn edit-btn" onclick="startEdit(${t.id})">수정</button>
                    <button class="action-btn del-btn" onclick="deleteTransaction(${t.id})">삭제</button>
                </td>
            </tr>`;
        }).join('');
    }

    function updateCatProp(id, prop, val) {
        const cat = categories.find(c => c.id === id);
        if(cat) cat[prop] = val;
    }

    function renderSettings() {
        const list = document.getElementById('category-list');
        list.innerHTML = categories.map((c, index) => {
            const fallbackColor = catColors[index % catColors.length];
            const tColor = c.textColor || fallbackColor;
            const bColor = c.borderColor || fallbackColor;
            const bgColor = hexToRgba(bColor, 0.15);

            return `
            <div class="category-item" style="background-color: ${bgColor}; border-left: 5px solid ${bColor}; padding: 14px;">
                <input type="text" value="${c.name}" style="flex:1; min-width:80px; padding:10px; background:var(--bg-color); color:#fff; border:1px solid var(--border-color); border-radius:4px; font-size:15px; font-weight: bold;" onchange="updateCatName(${c.id}, this.value)">
                
                <div style="display:flex; gap:8px; align-items:center;" title="왼쪽: 글자색 / 오른쪽: 테두리색">
                    <div style="display:flex; flex-direction:column; align-items:center;">
                        <span class="color-label">글자</span>
                        <input type="color" value="${tColor}" onchange="updateCatProp(${c.id}, 'textColor', this.value)" style="width:30px; height:30px; padding:0; border:none; background:transparent; cursor:pointer;">
                    </div>
                    <div style="display:flex; flex-direction:column; align-items:center;">
                        <span class="color-label">배경</span>
                        <input type="color" value="${bColor}" onchange="updateCatProp(${c.id}, 'borderColor', this.value)" style="width:30px; height:30px; padding:0; border:none; background:transparent; cursor:pointer;">
                    </div>
                </div>

                <input type="text" value="${Number(c.budget).toLocaleString()}" inputmode="numeric" style="width:100px; padding:10px; background:var(--bg-color); color:#fff; border:1px solid var(--border-color); border-radius:4px; font-size:15px; text-align:right;" oninput="inputFormatting(this); updateCatData(${c.id}, this.value)">
                <button onclick="deleteCat(${c.id})" style="background:var(--danger-color); border:none; color:white; padding:10px 14px; border-radius:4px; font-size:13px; cursor:pointer; font-weight:bold;">삭제</button>
            </div>
            `;
        }).join('');
    }

    function updateCatName(id, val) {
        const cat = categories.find(c => c.id === id);
        if(cat && val.trim() !== '') cat.name = val.trim();
    }

    function updateCatData(id, val) {
        const cat = categories.find(c => c.id === id);
        if(cat) cat.budget = parseFormatted(val);
    }

    function initCategorySelect() {
        const options = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        document.getElementById('exp-category').innerHTML = options;
        
        const filterEl = document.getElementById('history-filter');
        const currentFilter = filterEl.value;
        filterEl.innerHTML = '<option value="all">전체 항목 보기</option>' + options;
        if(currentFilter && currentFilter !== 'all' && categories.find(c => c.id == currentFilter)) {
            filterEl.value = currentFilter;
        }
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        const table = document.getElementById('history-table');
        const btn = document.getElementById('toggle-edit-btn');
        if (isEditMode) {
            table.classList.add('edit-mode-active');
            btn.innerText = '완료';
            btn.style.backgroundColor = 'var(--accent-color)';
            btn.style.color = '#fff';
        } else {
            table.classList.remove('edit-mode-active');
            btn.innerText = '편집';
            btn.style.backgroundColor = '#444';
            btn.style.color = 'var(--accent-color)';
        }
    }

    function startEdit(id) {
        const t = transactions.find(item => item.id == id);
        if(!t) return;
        document.getElementById('edit-id').value = t.id;
        document.getElementById('exp-date').value = t.date;
        document.getElementById('exp-note').value = t.note;
        document.getElementById('exp-amount').value = Number(t.amount).toLocaleString();
        document.getElementById('exp-category').value = t.catId;
        document.getElementById('form-title').innerText = "내역 수정";
        document.getElementById('save-btn').innerText = "수정 완료";
        document.getElementById('cancel-btn').style.display = "block";
        switchTab('expense-add', document.getElementById('btn-expense'));
    }

    function cancelEdit() {
        document.getElementById('edit-id').value = "";
        document.getElementById('exp-date').valueAsDate = new Date();
        document.getElementById('exp-note').value = "";
        document.getElementById('exp-amount').value = "";
        document.getElementById('form-title').innerText = "지출 기록";
        document.getElementById('save-btn').innerText = "지출 저장";
        document.getElementById('cancel-btn').style.display = "none";
    }

    function exportCSV(mode) {
        let filtered = transactions;
        if(mode === 'current') {
            const monthStr = document.getElementById('display-month').innerText;
            filtered = transactions.filter(t => t.date.startsWith(monthStr));
        }
        if(filtered.length === 0) return alert('데이터가 없습니다.');
        let csv = "\uFEFF날짜,항목,내용,금액\n";
        filtered.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(t => {
            const cat = categories.find(c => c.id === t.catId);
            csv += `${t.date},${cat ? cat.name : '미지정'},${t.note.replace(/,/g, '')},${t.amount}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `가계부_${mode==='all'?'전체':document.getElementById('display-month').innerText}.csv`;
        link.click();
    }

    function importCSV(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            for(let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',');
                if(parts.length < 4) continue;
                const [date, catName, note, amount] = parts;
                let cat = categories.find(c => c.name === catName.trim());
                const catId = cat ? cat.id : null;
                const id = Date.now() + Math.floor(Math.random()*1000);
                db.ref('transactions/' + id).set({ id, date: date.trim(), note: note.trim(), amount: parseInt(amount.trim()), catId });
            }
            alert('기존 데이터에 파일 내역이 합쳐졌습니다.');
            input.value = "";
        };
        reader.readAsText(file);
    }

    window.onload = () => {
        document.getElementById('exp-date').valueAsDate = new Date();
    }
</script>

</body>
</html>
